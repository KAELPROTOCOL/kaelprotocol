[package]
name = "swapkit"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "swapkit"
path = "src/lib.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
# Leitura de chain EVM (RpcVerifier). Mesma lib do maestro.
alloy = { version = "1.0", features = [
    "providers",
    "contract",
    "sol-types",
    "rpc-types-eth",
    "network",
    "reqwest",
] }

[dev-dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
